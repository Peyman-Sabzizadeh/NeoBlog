<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoBlog</title>
    <link rel="stylesheet" href="./src/output.css">
</head>
<body class="font-Vazir">
    <div class="container">
        <header class="flex items-center justify-between bg-black/50 backdrop-blur-2xl mt-4 p-2 px-3 rounded-lg">
            <!-- Logo -->
            <a href="index.html">
                <div class="flex items-center gap-x-2">
                    <img src="./src/img/Logo.svg" alt="Logo" class="w-10 h-10">
                    <h3>نئوبلاگ</h3>
                </div>
            </a>
            <!-- Search -->
            <div class="flex items-center">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6 absolute mr-1">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
                </svg>
                <input class="outline-none border-none p-2 pr-8 rounded-lg" type="search" placeholder="جستجو...">     
            </div>
            <!-- Login/Signup & Dark/Light mode -->
            <div class="flex items-center justify-center gap-x-2">
                <a class="btn bg-sky-500" href="./src/page/login.html">ورود</a>
                <a class="btn hover:bg-green-500" href="./src/page/login.html">ثبت‌نام</a>
                <div>
                    <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-8 rounded-lg cursor-pointer p-1 bg-slate-100 text-zinc-700 hover:bg-opacity-70">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
                    </svg>
                    <!-- <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-8 rounded-lg cursor-pointer p-1 bg-zinc-700 text-slate-100 hover:bg-opacity-70">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
                    </svg> -->
                </div>
            </div>
        </header>
        <main>
            <!-- Info section -->
            <section class="flex flex-col gap-y-4 bg-black/50 p-8 rounded-lg mt-2">
                <h2 class="text-4xl font-VazirBold">به نئوبلاگ خوش آمدید.</h2>
                <div class="flex items-center justify-around gap-x-2">
                    <p>نئوبلاگ،محلی برای تبادل اندیشه‌ها،خواندن مطالب متنوع و شرکت در گفتگو‌های جذاب و الهام بخش است.</p>
                    <div class="flex items-center relative text-slate-100">
                        <input type="submit" value="ایجاد پست" class="p-2 pl-8 bg-violet-500 rounded-lg hover:bg-violet-600 cursor-pointer">
                        <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5 absolute right-20">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
                        </svg>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
